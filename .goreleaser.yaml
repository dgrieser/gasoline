# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: gasoline

before:
  hooks:
    - go mod tidy

builds:
  - id: gasoline
    main: .
    binary: gasoline
    # Pure-Go stack (modernc.org/sqlite); CGO off yields fully static binaries.
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      # Version metadata is injected via ldflags below; skip Go's VCS stamping
      # so builds work from git worktrees and shallow checkouts too.
      - -buildvcs=false
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: amd64
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64

archives:
  - id: gasoline
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    files:
      - README.md
      - LICENSE*
      - gasoline-watch.sh

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
  name_template: "Release {{ .Tag }}"
